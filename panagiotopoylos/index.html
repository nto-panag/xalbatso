<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Αρχείο - Λεύκωμα Χαλβάτσο</title>
    <style>
        /* ΧΡΩΜΑΤΑ: Σκούρο απαλό καφέ-γκρι */
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: #2b2622; 
            color: #e0d0b0; 
            margin: 0; padding: 0; 
        }

        /* ΜΕΓΑΛΟ ΚΟΥΜΠΙ ΠΙΣΩ */
        .top-nav {
            background: #1a1714;
            padding: 15px;
            text-align: left;
            border-bottom: 2px solid #d35400;
        }
        .back-btn {
            color: #fff;
            background: #d35400;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1em;
            display: inline-block;
            transition: 0.3s;
        }
        .back-btn:hover { background: #e67e22; }

        .header { padding: 30px 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 1.8em; letter-spacing: 2px; text-transform: uppercase; color: #f1e1c1; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* GALLERY GRID */
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
        }

.photo-card img { 
    width: 100%;       /* Πιάνει όλο το πλάτος του κουτιού */
    height: auto;      /* ΤΟ ΠΙΟ ΣΗΜΑΝΤΙΚΟ: Το ύψος αλλάζει μόνο του */
    display: block; 
    cursor: pointer; 
    border-radius: 2px;
    object-fit: contain; /* Σιγουριά ότι δεν θα κοπεί τίποτα */
}

.photo-card { 
    background: #36302a; 
    border: 1px solid #4a423a; 
    padding: 10px; 
    border-radius: 4px; 
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    justify-content: space-between; /* Κρατάει τη λεζάντα πάντα κάτω */
}

        .caption { 
            font-size: 0.9em; text-align: center; color: #cbbba0; 
            padding: 12px 5px 5px 5px; min-height: 40px; display: flex; align-items: center; justify-content: center;
        }

        /* ΜΕΓΕΘΥΝΣΗ (OVERLAY) */
        #overlay {
            position: fixed; display: none; width: 100%; height: 100%;
            top: 0; left: 0; background: rgba(0,0,0,0.95);
            z-index: 1000; cursor: pointer; text-align: center;
        }
        #expandedImg { max-width: 95%; max-height: 85%; margin-top: 3%; border: 5px solid #333; }
        .close { position: absolute; top: 15px; right: 35px; color: #fff; font-size: 40px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="../index.htm" class="back-btn">← ΕΠΙΣΤΡΟΦΗ</a>
    </div>

    <div class="header">
        <h1 id="folderTitle">ΟΙΚΟΓΕΝΕΙΑ: ΠΑΝΑΓΙΩΤΟΠΟΥΛΟΣ</h1>
    </div>

    <div class="container">
        <div class="gallery" id="mainGallery">
            </div>
    </div>

    <div id="overlay" onclick="this.style.display='none'">
        <span class="close">&times;</span>
        <img id="expandedImg">
    </div>

    <script>
        // --- ΕΔΩ ΠΡΟΣΘΕΤΕΙΣ ΤΙΣ ΦΩΤΟΓΡΑΦΙΕΣ ΣΟΥ ---
        // Format: ["Όνομα_Αρχείου.jpg", "Λεζάντα Φωτογραφίας"]
        const myPhotos = [
            ["scr1.jpg", "Τακης & Μαρια Παναγιωτοπουλος....."],
			["scr21.jpg", "Νικος Παναγιωτοπουλος "],
			["scr22.jpg", "Νικος & Τακης Παναγιωτοπουλος"],
			["scr23.jpg", "Στάυρος & Αλέκα Παναγιωτοπουλος"],
            ["scr2.jpg", "Θανασης "],
			["scr3.jpg", "Στο παλιο καφενειο . Μαρια , Χιονης και αλλοι"],
			["scr4.jpg", "Μαρια, Αντωνης , Γιαννης"],
            ["scr5.jpg", "Θανασης"],
			["scr6.jpg", "Φανταρος Θανασης"],
            ["scr7.jpg", "Θανασης , θοδωρακης Χρηστος Καλοφωλιας , Αριστειδης ."],
            ["scr8.jpg", "..ολοι παρερα..."],
			["scr9.jpg", "Κουλα , Μαρια, Αντωνης"],
            ["scr10.jpg", "Βασιλης , Αντωνης, Διονυσια γιαγια ,Σουλα, Τακης μωρο..."],
			["scr11.jpg", "Στην βρυση....."],
			["scr12.jpg", "Εμενα στο γαιδουρι....."],
            ["scr13.jpg", "Χορος.."],
            // Κάνε αντιγραφή τη γραμμή από πάνω και άλλαξε τα στοιχεία
        ];

        // Μηχανή παραγωγής της Gallery
        const gallery = document.getElementById('mainGallery');
        myPhotos.forEach(p => {
            gallery.innerHTML += `
                <div class="photo-card">
                    <img src="${p[0]}" onclick="openPhoto(this)">
                    <div class="caption">${p[1]}</div>
                </div>`;
        });

        // Λειτουργία Μεγέθυνσης
        function openPhoto(imgs) {
            var expandImg = document.getElementById("expandedImg");
            var overlay = document.getElementById("overlay");
            expandImg.src = imgs.src;
            overlay.style.display = "block";
        }
    </script>

</body>
</html>
